{% extends "base.html" %}
{% block title %}Restaurant Portal Login - ReserveEZ{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h3 class="text-center mb-4" style="color: var(--tg-accent);">Restaurant Portal</h3>
      <form method="POST" action="/portal/login">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-accent w-100">Login</button>
      </form>
      <p class="text-center mt-3 mb-0">
        <a href="/portal/register">Don't have an account? Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

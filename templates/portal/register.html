{% extends "base.html" %}
{% block title %}Register - Restaurant Portal - ReserveEZ{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-8">
    <h2 class="text-center mb-4" style="color: var(--tg-accent);">Restaurant Portal Registration</h2>
    <form method="POST" action="/portal/register">
      <div class="card p-4 mb-4">
        <h5 class="mb-3">Owner Information</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="col-md-6">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="col-md-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone">
          </div>
        </div>
      </div>

      <div class="card p-4 mb-4">
        <h5 class="mb-3">Restaurant Information</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="restaurant_name" class="form-label">Restaurant Name</label>
            <input type="text" class="form-control" id="restaurant_name" name="restaurant_name" required>
          </div>
          <div class="col-md-6">
            <label for="cuisine_type" class="form-label">Cuisine Type</label>
            <select class="form-select" id="cuisine_type" name="cuisine_type">
              {% for ct in cuisine_types %}
              <option value="{{ ct }}">{{ ct }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" name="address">
          </div>
          <div class="col-md-6">
            <label for="restaurant_phone" class="form-label">Restaurant Phone</label>
            <input type="text" class="form-control" id="restaurant_phone" name="restaurant_phone">
          </div>
          <div class="col-md-6">
            <label for="restaurant_email" class="form-label">Restaurant Email</label>
            <input type="email" class="form-control" id="restaurant_email" name="restaurant_email">
          </div>
          <div class="col-12">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-accent btn-lg w-100">Register &amp; Submit Restaurant</button>
    </form>
    <p class="text-center mt-3">
      <a href="/portal/login">Already have an account? Login here</a>
    </p>
  </div>
</div>
{% endblock %}
